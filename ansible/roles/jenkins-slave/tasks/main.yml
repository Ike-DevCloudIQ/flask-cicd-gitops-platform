---
- name: Create jenkins agent user
  ansible.builtin.user:
    name: jenkins
    shell: /bin/bash
    create_home: true

- name: Create Jenkins agent working directory
  ansible.builtin.file:
    path: "{{ jenkins_agent_workdir }}"
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"

- name: Ensure Java runtime is present for Jenkins agent
  ansible.builtin.dnf:
    name: java-17-amazon-corretto-headless
    state: present

- name: Download Trivy vulnerability scanner
  ansible.builtin.shell: |
    curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  args:
    creates: /usr/local/bin/trivy
  retries: 3
  delay: 5

- name: Verify Trivy installation
  ansible.builtin.command: trivy version
  changed_when: false
