---
- name: Install Java 21 (Amazon Corretto)
  ansible.builtin.dnf:
    name: java-21-amazon-corretto-headless
    state: present

- name: Set Java 21 as system default
  ansible.builtin.command: alternatives --set java /usr/lib/jvm/java-21-amazon-corretto.x86_64/bin/java
  changed_when: false

- name: Verify Java installation
  ansible.builtin.command: java -version
  changed_when: false
