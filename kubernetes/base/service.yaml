apiVersion: v1
kind: Service
metadata:
  name: flask-app
  namespace: flask-app
  labels:
    app: flask-app
spec:
  type: LoadBalancer
  selector:
    app: flask-app
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http

# Why LoadBalancer: exposes the app externally (on AWS, creates an ELB).