apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

images:
- name: emekaezedozie276/flask-app
  newTag: "3091"

patches:
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: flask-app
    namespace: flask-app

configMapGenerator:
- name: flask-config
  behavior: merge
  literals:
  - app_env=dev

